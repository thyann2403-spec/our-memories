<!DOCTYPE html>
<html>
<head>
    <title>Kỷ Niệm Của Chúng Ta</title>
    <style>
        body { background: #fff0f5; text-align: center; font-family: 'Arial', sans-serif; }
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; padding: 20px; }
        .photo { width: 250px; border: 8px solid white; box-shadow: 0 4px 8px rgba(0,0,0,0.2); transition: 0.3s; }
        .photo:hover { transform: rotate(-5deg) scale(1.1); }
        h1 { color: #d02090; margin-top: 50px; }
        .message { font-style: italic; color: #555; }
    </style>
</head>
<body>
    <h1> Every moment with you is special. Happy birthday, my love! ❤️</h1>
    <p class="message">Every picture is a little piece of the happiness we share</p>
    
    <div class="gallery">
        <img src="1 (1).jpg" class="photo">
        <img src="1 (2).jpg" class="photo">
        <img src="1 (3).jpg" class="photo">
        <img src="1 (4).jpg" class="photo">
        <img src="1 (5).JPG" class="photo">
        <img src="1 (6).JPG" class="photo">
        <img src="1 (7).jpg" class="photo">
    </div>
</body>
</html>
